backend:
  - changed-files:
      - any-glob-to-any-file: backend/**

frontend:
  - changed-files:
      - any-glob-to-any-file: frontend/**

docs:
  - changed-files:
      - any-glob-to-any-file: '**/*.md'
      - any-glob-to-any-file: docs/**

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/workflows/**'
      - any-glob-to-any-file: '.github/**/*.{yml,yaml}'
      - any-glob-to-any-file: renovate.json

ai-ml:
  - changed-files:
      - any-glob-to-any-file: backend/src/modules/ai/**
      - any-glob-to-any-file: backend/src/config/ai.js

database:
  - changed-files:
      - any-glob-to-any-file: backend/migrations/**
      - any-glob-to-any-file: backend/seeds/**
      - any-glob-to-any-file: '**/*migration*'
      - any-glob-to-any-file: '**/*schema*'

tests:
  - changed-files:
      - any-glob-to-any-file: '**/*.test.js'
      - any-glob-to-any-file: '**/*.spec.js'
      - any-glob-to-any-file: backend/tests/**

dependencies:
  - changed-files:
      - any-glob-to-any-file: '**/package.json'
      - any-glob-to-any-file: '**/package-lock.json'
      - any-glob-to-any-file: renovate.json

security:
  - changed-files:
      - any-glob-to-any-file: backend/src/middleware/auth*
      - any-glob-to-any-file: backend/src/middleware/**/auth*
      - any-glob-to-any-file: backend/src/utils/hierarchy.js