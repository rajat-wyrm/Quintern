name: Discord — Issue Events (#github-feed)

on:
  issues:
    types: [opened, reopened, closed, assigned, labeled]

concurrency:
  group: discord-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          REPO: ${{ github.repository }}
          ACTION: ${{ github.event.action }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          set -euo pipefail
          # Single jq pass: build the entire Discord payload from the event.
          # No bash string interpolation for payload data — avoids IFS splits
          # and backtick command-substitution traps on titles/bodies with spaces.
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg action "$ACTION" \
            --argjson event "$EVENT_PAYLOAD" \
            '
            def emoji_status:
              if $action == "closed" then {e:"✅", s:"CLOSED", c:3898326}
              elif $action == "opened" or $action == "reopened" then {e:"🆕", s:($action|ascii_upcase), c:6323599}
              else {e:"🏷️", s:($action|ascii_upcase), c:6323599}
              end;
            def labels_text:
              ($event.issue.labels | map(.name) |
                if length == 0 then "none"
                else map("`" + . + "`") | join(" ")
                end);
            . as $unused |
            (emoji_status) as $es |
            {
              username: "Quintern Bot",
              embeds: [{
                title: "\($es.e) [Issue] #\($event.issue.number) \($event.issue.title)",
                url: $event.issue.html_url,
                color: $es.c,
                author: {
                  name: $event.issue.user.login,
                  icon_url: $event.issue.user.avatar_url,
                  url: $event.issue.user.html_url
                },
                fields: [
                  { name: "📦 Repo",   value: $repo, inline: true },
                  { name: "📊 Status", value: $es.s, inline: true },
                  { name: "🏷️ Labels", value: labels_text, inline: false }
                ],
                footer: { text: "Quintern • github-feed", icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" },
                timestamp: (now | todate)
              }]
            }
            ')
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord webhook returned: HTTP $HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then exit 1; fi
