name: Discord тАФ Push Events (#github-feed)

on:
  push:
    branches-ignore:
      - 'dependabot/**'

concurrency:
  group: discord-push-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Build & send Discord embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          REF: ${{ github.ref }}
          REPO: ${{ github.repository }}
          SENDER: ${{ github.event.sender.login }}
          SENDER_ICON: ${{ github.event.sender.avatar_url }}
          SENDER_URL: ${{ github.event.sender.html_url }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          set -euo pipefail
          BRANCH="${REF#refs/heads/}"
          TOTAL=$(jq -r '.commits | length' <<< "$EVENT_PAYLOAD")
          SHOWN=$(jq -r '.commits[0:3] | map("\(.id[0:7])\t\(.url)\t\(.message | split("\n")[0][0:80])\t\(.author.name)") | .[] | @tsv' <<< "$EVENT_PAYLOAD" | awk -F'\t' '{ printf "[`%s`](%s) %s тАФ %s\n", $1, $2, $3, $4 }')
          MORE=""
          if [ "$TOTAL" -gt 3 ]; then MORE=$'\nтАжand **'"$((TOTAL-3))"'** more'; fi
          HEAD_URL=$(jq -r '.commits[-1].url // ""' <<< "$EVENT_PAYLOAD")

          EMBED=$(jq -n \
            --arg title "ЁЯУе Push to \`$BRANCH\`" \
            --arg desc "${SHOWN}${MORE}" \
            --arg url "$HEAD_URL" \
            --arg author "$SENDER" \
            --arg icon "$SENDER_ICON" \
            --arg author_url "$SENDER_URL" \
            --arg repo "$REPO" \
            --arg branch "`$BRANCH`" \
            --arg total "$TOTAL" \
            '{
              title: $title, url: $url, description: $desc, color: 10957793,
              author: { name: $author, icon_url: $icon, url: $author_url },
              fields: [
                { name: "ЁЯУж Repo", value: $repo, inline: true },
                { name: "ЁЯМ┐ Branch", value: $branch, inline: true },
                { name: "ЁЯФв Commits", value: $total, inline: true }
              ],
              footer: { text: "Quintern тАв github-feed", icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" },
              timestamp: (now | todate)
            }')
          PAYLOAD=$(jq -n --arg embed "$EMBED" '{username: "Quintern Bot", embeds: [$embed | fromjson]}')
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord webhook returned: HTTP $HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then exit 1; fi

