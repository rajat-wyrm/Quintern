name: Discord — Push Events (#github-feed)

on:
  push:
    branches-ignore:
      - 'dependabot/**'

concurrency:
  group: discord-push-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    name: Notify #github-feed
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          REF: ${{ github.ref }}
          REPO: ${{ github.repository }}
          PUSHER: ${{ github.event.pusher.name }}
          HEAD_URL: ${{ github.event.head_commit.url }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          set -euo pipefail
          BRANCH="${REF#refs/heads/}"
          COUNT=$(jq '.commits | length' <<< "$EVENT_PAYLOAD")
          SHOWN=$(jq -r '
            [.commits[0:3][] |
              "[\`" + (.id[0:7]) + "\`](" + .url + ") " + ((.message | split("\n")[0])[0:80]) + " — " + .author.name
            ] | join("\n")
          ' <<< "$EVENT_PAYLOAD")
          MORE=""
          if [ "$COUNT" -gt 3 ]; then
            MORE=$(printf '\n…and **%d** more' $((COUNT - 3)))
          fi
          DESC="${SHOWN}${MORE}"
          HEAD_URL_VAL="$HEAD_URL"
          if [ -z "$HEAD_URL_VAL" ] || [ "$HEAD_URL_VAL" = "null" ]; then
            HEAD_URL_VAL=""
          fi
          ICON="https://github.com/${PUSHER}.png?size=64"
          AUTHOR_URL="https://github.com/${PUSHER}"
          EMBED=$(jq -n \
            --arg title "📥 Push to \`${BRANCH}\`" \
            --arg desc "$DESC" \
            --arg author "$PUSHER" \
            --arg icon "$ICON" \
            --arg author_url "$AUTHOR_URL" \
            --arg url "$HEAD_URL_VAL" \
            --arg repo "$REPO" \
            --arg branch "`${BRANCH}`" \
            --argjson count "$COUNT" \
            '{
              title: $title, url: $url, description: $desc, color: 10947121,
              author: { name: $author, icon_url: $icon, url: $author_url },
              fields: [
                { name: "📦 Repo", value: $repo, inline: true },
                { name: "🌿 Branch", value: $branch, inline: true },
                { name: "🔢 Commits", value: ($count | tostring), inline: true }
              ],
              footer: { text: "Quintern • github-feed", icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" },
              timestamp: (now | todate)
            }')
          PAYLOAD=$(jq -n --arg embed "$EMBED" '{username: "Quintern Bot", embeds: [$embed | fromjson]}')
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord webhook returned: HTTP $HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then exit 1; fi
