name: 🚀 Release

# Auto-build and publish a GitHub Release whenever a semver tag is pushed.
# Usage:  git tag v2026.06.1 && git push --tags origin main
# Then this workflow:
#   1. Runs the full CI suite (so a tag can never be on a broken build)
#   2. Builds backend + frontend (Vite production build → dist/)
#   3. Zips the artifacts
#   4. Creates a GitHub Release with auto-generated notes from merged PRs

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2026.06.1)'
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    name: Run CI suite
    uses: ./.github/workflows/ci.yml
    with:
      # Re-uses the canonical CI workflow
      # (no inputs today, but the seam is here for future)
  release:
    name: Build & publish release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install backend + frontend deps
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build
          echo "Frontend built: $(du -sh dist | cut -f1)"

      - name: Package artifacts
        run: |
          mkdir -p release-artifacts
          TAG="${{ steps.tag.outputs.tag }}"
          # Frontend SPA
          (cd frontend && tar -czf "../release-artifacts/frontend-${TAG}.tar.gz" dist)
          # Backend runtime
          (cd backend && tar -czf "../release-artifacts/backend-${TAG}.tar.gz" \
            --exclude=node_modules --exclude=coverage --exclude=uploads \
            --exclude=.env --exclude=__tests__ --exclude=tests \
            --exclude='*.test.js' .)
          # Docker compose
          tar -czf "release-artifacts/docker-${TAG}.tar.gz" \
            docker-compose.production.yml Dockerfile

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Uptoskills Workforce Platform ${{ steps.tag.outputs.tag }}'
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-rc') || contains(steps.tag.outputs.tag, '-beta') }}
          files: |
            release-artifacts/frontend-${{ steps.tag.outputs.tag }}.tar.gz
            release-artifacts/backend-${{ steps.tag.outputs.tag }}.tar.gz
            release-artifacts/docker-${{ steps.tag.outputs.tag }}.tar.gz
          body: |
            ## Uptoskills Workforce Platform — ${{ steps.tag.outputs.tag }}

            Auto-built from commit `${{ github.sha }}` on branch `${{ github.ref_name }}`.

            ### What's included
            - **Backend** (Fastify + PostgreSQL + JWT) — `backend-${{ steps.tag.outputs.tag }}.tar.gz`
            - **Frontend** (React + Vite) — `frontend-${{ steps.tag.outputs.tag }}.tar.gz`
            - **Docker compose** (production stack) — `docker-${{ steps.tag.outputs.tag }}.tar.gz`

            ### Deploy
            ```bash
            # Pull + run
            docker compose -f docker-compose.production.yml up -d

            # Or extract and run manually
            tar -xzf backend-${{ steps.tag.outputs.tag }}.tar.gz
            cd backend && npm ci --production && node src/app.js
            tar -xzf frontend-${{ steps.tag.outputs.tag }}.tar.gz
            ```

            See `README.md` for full configuration and `.env.example` for environment variables.

            _Generated automatically by the Release workflow._

      - name: Cleanup
        if: always()
        run: rm -rf release-artifacts
