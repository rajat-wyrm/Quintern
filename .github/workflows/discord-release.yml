name: Discord — Release Published (#ci-cd)

on:
  release:
    types: [published]

concurrency:
  group: discord-release-${{ github.event.release.id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    name: Notify #ci-cd
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CICD }}
          REPO: ${{ github.repository }}
          EVENT_PAYLOAD: ${{ toJSON(github.event.release) }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --argjson release "$EVENT_PAYLOAD" \
            '
            def is_prerelease:
              .prerelease // false;
            def emoji_status:
              if is_prerelease then {e:"🚧", s:"PRE-RELEASE", c:9128191}
              elif .draft == true then {e:"📝", s:"DRAFT", c:7039851}
              else {e:"🚀", s:"RELEASED", c:11035093}
              end;
            def short_notes:
              (.body // "" |
                if length == 0 then "_no release notes_"
                elif length > 1000 then .[0:1000] + "…"
                else .
                end);
            (emoji_status) as $es |
            {
              username: "Quintern CI",
              embeds: [{
                title: "\($es.e) [Release] \(.tag_name) — \(.name // "")",
                url: .html_url,
                color: $es.c,
                author: {
                  name: (.author.login // "unknown"),
                  icon_url: (.author.avatar_url // "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"),
                  url: (.author.html_url // "https://github.com")
                },
                fields: [
                  { name: "📦 Repo", value: $repo, inline: true },
                  { name: "📊 Status", value: $es.s, inline: true },
                  { name: "🏷️ Tag", value: ("`\(.tag_name)`"), inline: true },
                  { name: "📝 Notes", value: short_notes, inline: false }
                ],
                footer: { text: ("Quintern • ci-cd • release #\(.id)"), icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" },
                timestamp: (.published_at // now | todate)
              }]
            }
            ')
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord webhook returned: HTTP $HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then exit 1; fi
